<html lang="ru">
<head>

</head>
<body>
    <header>

                </svg>
                <span>Singlish</span>
            </div>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="tasks.html">Tasks</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Reviews</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="player-main">
        <div class="player-container">
            <div class="player-header">
                <div class="player-cover">
                    <img id="song-cover" src="" alt="Song Cover">
                </div>
                <div class="player-info">
                    <h2 id="song-title"></h2>
                    <p id="song-artist">Ivoxygen</p>
                    <div class="navigation-buttons">
                        <a href="tasks.html" class="nav-button">
                            <i class="fas fa-arrow-left"></i> Back to Artists
                        </a>
                        <a href="songs.html" class="nav-button">
                            <i class="fas fa-arrow-left"></i> Back to Songs
                        </a>
                    </div>
                </div>
            </div>
            <div class="player-controls">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress"></div>
                    </div>
                    <div class="time-info">
                        <span class="current-time">0:00</span>
                        <span class="duration">0:00</span>
                    </div>
                </div>
                <div class="controls">
                    <button class="control-btn" id="prev-btn">
                        <i class="fas fa-step-backward"></i>
                    </button>
                    <button class="control-btn play-btn" id="play-btn">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="control-btn" id="next-btn">
                        <i class="fas fa-step-forward"></i>
                    </button>
                    <button class="control-btn" id="loop-btn" title="Loop">
                        <i class="fas fa-redo"></i>
                    </button>
                    <div class="volume-container">
                        <button class="control-btn" id="mute-btn">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <div class="volume-bar">
                            <div class="volume-level"></div>
                        </div>
                    </div>
                </div>
            </div>
            <audio id="audio-player">
                <source id="audio-source" src="" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const songName = urlParams.get('song');

            const audio = document.getElementById('audio-player');
            const playBtn = document.getElementById('play-btn');
            const progressBar = document.querySelector('.progress');
            const progressContainer = document.querySelector('.progress-bar');
            const currentTimeEl = document.querySelector('.current-time');
            const durationEl = document.querySelector('.duration');
            const volumeBar = document.querySelector('.volume-level');
            const volumeContainer = document.querySelector('.volume-bar');
            const muteBtn = document.getElementById('mute-btn');
            const loopBtn = document.getElementById('loop-btn');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            if (!audio || !playBtn || !progressBar || !progressContainer || !currentTimeEl || 
                !durationEl || !volumeBar || !volumeContainer || !muteBtn || !loopBtn || 
                !prevBtn || !nextBtn) {
                console.error('Не все элементы управления найдены');
                return;
            }

            function loadSong(song) {
                const songs = {
                    'skin': {
                        title: 'Skin',
                        cover: 'https://raw.githubusercontent.com/S1ngl1sh/singlish/main/Images/Skin.jpg',
                        audio: 'https://raw.githubusercontent.com/S1ngl1sh/singlish/main/Musics/Skin.mp3',
                        duration: '3:02'
                    },
                    'muddy-shoes': {
                        title: 'Muddy Shoes',
                        cover: 'https://raw.githubusercontent.com/S1ngl1sh/singlish/main/Images/6752f97a8e5104ff05081bb32290dfd8.jpg',
                        audio: 'https://raw.githubusercontent.com/S1ngl1sh/singlish/main/Musics/Muddy%20Shoes.mp3',
                        duration: '2:07'
                    },
                    'lifestyle': {
                        title: 'Lifestyle',
                        cover: 'https://raw.githubusercontent.com/S1ngl1sh/singlish/main/Images/Lifestyle.jpg',
                        audio: 'https://raw.githubusercontent.com/S1ngl1sh/singlish/main/Musics/Lifestyle.mp3',
                        duration: '2:54'
                    }
                };

                if (songs[song]) {
                    document.getElementById('song-title').textContent = songs[song].title;
                    document.getElementById('song-cover').src = songs[song].cover;
                    document.getElementById('audio-source').src = songs[song].audio;
                    document.getElementById('audio-player').load();
                    durationEl.textContent = songs[song].duration;
                }
            }

            if (songName) {
                loadSong(songName);
            }

            playBtn.addEventListener('click', () => {
                if (audio.paused) {
                    audio.play().catch(error => {
                        console.error('Ошибка воспроизведения:', error);
                    });
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                } else {
                    audio.pause();
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                }
            });

            audio.addEventListener('timeupdate', () => {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progress}%`;
                
                const minutes = Math.floor(audio.currentTime / 60);
                const seconds = Math.floor(audio.currentTime % 60);
                currentTimeEl.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            });

            progressContainer.addEventListener('click', (e) => {
                const width = progressContainer.clientWidth;
                const clickX = e.offsetX;
                const duration = audio.duration;
                audio.currentTime = (clickX / width) * duration;
            });

            audio.addEventListener('loadedmetadata', () => {
                const minutes = Math.floor(audio.duration / 60);
                const seconds = Math.floor(audio.duration % 60);
                const formattedDuration = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                durationEl.textContent = formattedDuration;
            });

            volumeBar.addEventListener('click', (e) => {
                const width = volumeContainer.clientWidth;
                const clickX = e.offsetX;
                const volume = clickX / width;
                audio.volume = volume;
                volumeBar.style.width = `${volume * 100}%`;
                
                if (volume === 0) {
                    muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                } else if (volume < 0.5) {
                    muteBtn.innerHTML = '<i class="fas fa-volume-down"></i>';
                } else {
                    muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                }
            });

            muteBtn.addEventListener('click', () => {
                if (audio.muted) {
                    audio.muted = false;
                    volumeBar.style.width = `${audio.volume * 100}%`;
                    if (audio.volume === 0) {
                        muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                    } else if (audio.volume < 0.5) {
                        muteBtn.innerHTML = '<i class="fas fa-volume-down"></i>';
                    } else {
                        muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                    }
                } else {
                    audio.muted = true;
                    volumeBar.style.width = '0%';
                    muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                }
            });

            loopBtn.addEventListener('click', () => {
                audio.loop = !audio.loop;
                loopBtn.classList.toggle('active');
            });

            prevBtn.addEventListener('click', () => {
                audio.currentTime = Math.max(0, audio.currentTime - 5);
            });

            nextBtn.addEventListener('click', () => {
                audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
            });

            document.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'Space':
                        e.preventDefault();
                        if (audio.paused) {
                            audio.play().catch(error => {
                                console.error('Ошибка воспроизведения:', error);
                            });
                            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        } else {
                            audio.pause();
                            playBtn.innerHTML = '<i class="fas fa-play"></i>';
                        }
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        audio.currentTime = Math.max(0, audio.currentTime - 5);
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
                        break;
                }
            });
        });

        document.querySelector('.menu-toggle').addEventListener('click', function() {
            this.classList.toggle('active');
            document.querySelector('.nav-links').classList.toggle('active');
            
            const spans = this.querySelectorAll('span');
            if (this.classList.contains('active')) {
                spans[0].style.transform = 'rotate(45deg) translate(6px, 6px)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'rotate(-45deg) translate(6px, -6px)';
            } else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.menu-toggle').classList.remove('active');
                document.querySelector('.nav-links').classList.remove('active');
                document.querySelectorAll('.menu-toggle span').forEach(span => {
                    span.style.transform = 'none';
                    span.style.opacity = '1';
                });
            });
        });
    </script>
</body>
</html>
